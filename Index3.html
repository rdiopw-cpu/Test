<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Reading</title>

<style>
body {
  margin:0;
  background:#0d0d12;
  color:white;
  font-family:sans-serif;
}

h1 {
  text-align:center;
  font-size:16px;
  opacity:.7;
}

.deck {
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:5px;
  padding:10px;
}

.card {
  width:42px;
  height:65px;
  perspective:600px;
}

.inner {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:.6s;
}

.card.flipped .inner {
  transform:rotateY(180deg);
}

.front,.back {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:6px;
  backface-visibility:hidden;
}

.back {
  background:url("https://i.imgur.com/7s5Q9hM.jpeg") center/cover;
}

.front {
  transform:rotateY(180deg);
  background-size:cover;
}

.reading {
  position:relative;
  height:420px;
}

.card-large {
  position:absolute;
  width:80px;
  text-align:center;
}

.card-large img {
  width:100%;
  border-radius:10px;
}

.reversed img { transform:rotate(180deg); }
.rotate90 img { transform:rotate(90deg); }

.pos1 { left:30%; top:45%; }
.pos2 { left:45%; top:45%; }
.pos3 { left:38%; top:15%; }
.pos4 { left:38%; top:75%; }
.pos5 { left:65%; top:45%; }
.pos7 { left:80%; top:45%; }
.pos6 { left:80%; top:75%; }
.pos8 { left:80%; top:15%; }

button {
  display:block;
  margin:10px auto;
  padding:10px;
  border:none;
  background:#222;
  color:white;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Pick 8 Cards</h1>

<div id="deck" class="deck"></div>
<div id="reading" class="reading"></div>
<button onclick="resetReading()">Reset</button>

<script>

// ===== TAROT IMAGE SOURCE (VALID) =====
const BASE = "https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/";

// ===== DATA =====
const major = [
"the-fool","the-magician","the-high-priestess","the-empress","the-emperor",
"the-hierophant","the-lovers","the-chariot","strength","the-hermit",
"wheel-of-fortune","justice","the-hanged-man","death","temperance",
"the-devil","the-tower","the-star","the-moon","the-sun","judgement","the-world"
];

const suits = ["wands","cups","swords","pentacles"];
const ranks = ["ace","2","3","4","5","6","7","8","9","10","page","knight","queen","king"];

let tarot = [];

// build deck with real filenames
major.forEach(c=>{
  tarot.push({
    name: c.replace(/-/g," "),
    img: BASE + c + ".jpg"
  });
});

suits.forEach(s=>{
  ranks.forEach(r=>{
    tarot.push({
      name: r + " of " + s,
      img: BASE + r + "_of_" + s + ".jpg"
    });
  });
});

let selected = [];

const deckEl = document.getElementById("deck");
const readingEl = document.getElementById("reading");

// ===== LOAD =====
function loadDeck(){
  deckEl.innerHTML="";
  tarot.forEach((card,i)=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      <div class="inner">
        <div class="back"></div>
        <div class="front" id="f${i}"></div>
      </div>`;
    el.onclick=()=>pickCard(i,el);
    deckEl.appendChild(el);
  });
}

// ===== PICK =====
function pickCard(i,el){
  if(selected.length>=8) return;
  if(selected.find(c=>c.i===i)) return;

  el.classList.add("flipped");
  document.getElementById("f"+i).style.backgroundImage=`url(${tarot[i].img})`;

  const reversed=Math.random()>0.5;

  selected.push({i,reversed});

  setTimeout(()=>placeCard(selected.length-1),500);
}

// ===== PLACE =====
function placeCard(pos){
  const data=selected[pos];
  const c=tarot[data.i];

  const div=document.createElement("div");
  div.className="card-large pos"+(pos+1);

  if(data.reversed) div.classList.add("reversed");
  if(pos===1) div.classList.add("rotate90");

  div.innerHTML=`
    <img src="${c.img}">
    <div style="font-size:10px">${c.name}</div>
  `;

  readingEl.appendChild(div);
}

// ===== RESET =====
function resetReading(){
  selected=[];
  readingEl.innerHTML="";
  loadDeck();
}

loadDeck();

</script>

</body>
</html>
