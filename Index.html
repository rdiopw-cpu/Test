<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarot Oracle Pro - Fixed & Safe</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0d0d0f;
            --card-w: 65px;
            --card-h: 110px;
            --accent: #1a1a1d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header { text-align: center; padding: 15px 10px; }
        h1 { margin: 0; font-size: 1.2rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
        #status { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* DECK AREA: 5 BARIS KE BAWAH (Horizontal Scroll) */
        #deck-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0;
            cursor: grab;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }
        #deck-wrapper::-webkit-scrollbar { display: none; }

        #deck-container {
            display: grid;
            /* Membuat 5 baris tetap */
            grid-template-rows: repeat(5, var(--card-h));
            grid-auto-flow: column; /* Mengalir ke kanan */
            gap: 10px;
            padding: 0 20px;
            width: max-content;
        }

        /* CARD STYLING */
        .card {
            width: var(--card-w);
            height: var(--card-h);
            perspective: 1000px;
            position: relative;
            transition: opacity 0.3s;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 6px;
            border: 1px solid var(--gold);
            overflow: hidden;
        }

        .card-back {
            background: var(--accent) radial-gradient(circle, var(--gold) 1px, transparent 1px);
            background-size: 12px 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-back::after { content: "✧"; color: var(--gold); font-size: 1.2rem; opacity: 0.5; }

        .card-front {
            background: #111;
            transform: rotateY(180deg);
            display: flex; flex-direction: column;
        }

        .card-front img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* SAFE FALLBACK: Jika gambar kosong/error */
        .card-fallback {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 0.6rem; padding: 5px;
            background: #111; color: var(--gold);
            z-index: -1; /* Berada di belakang img */
        }

        .card-label {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(0,0,0,0.85);
            font-size: 0.5rem; text-align: center;
            padding: 3px 0; border-top: 0.5px solid var(--gold);
        }

        /* LAYOUT AREA: FINAL SPREAD */
        #layout-outer {
            width: 100%;
            display: flex; justify-content: center;
            margin-top: 20px; padding-bottom: 40px;
        }

        #layout-grid {
            display: grid;
            grid-template-columns: repeat(4, var(--card-w));
            grid-template-rows: repeat(3, var(--card-h));
            gap: 15px;
            position: relative;
            opacity: 0; transition: opacity 1s;
        }

        .slot {
            width: var(--card-w); height: var(--card-h);
            border: 1px dashed rgba(212, 175, 87, 0.15);
            border-radius: 6px;
        }

        /* Mapping Slot Positions */
        .slot-1, .slot-2 { grid-column: 2; grid-row: 2; border: none; } 
        .slot-3 { grid-column: 2; grid-row: 1; }
        .slot-4 { grid-column: 2; grid-row: 3; }
        .slot-5 { grid-column: 3; grid-row: 2; }
        .slot-7 { grid-column: 4; grid-row: 2; }
        .slot-8 { grid-column: 4; grid-row: 1; }
        .slot-6 { grid-column: 4; grid-row: 3; }

        /* Animation Classes */
        .moving { position: fixed !important; z-index: 9999; pointer-events: none; }
        .final-1 { transform: rotate(90deg) !important; z-index: 10; }
        .final-2 { transform: rotate(0deg) !important; z-index: 11; }

        .controls { margin-bottom: 30px; }
        button {
            background: none; border: 1.5px solid var(--gold);
            color: var(--gold); padding: 10px 25px;
            border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        button:active { background: var(--gold); color: black; }

        @media (max-width: 360px) {
            :root { --card-w: 60px; --card-h: 100px; }
            #layout-grid { gap: 8px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tarot Oracle</h1>
        <div id="status">Mengocok Deck...</div>
    </header>

    <div id="deck-wrapper">
        <div id="deck-container"></div>
    </div>

    <div id="layout-outer">
        <div id="layout-grid">
            <div class="slot slot-1"></div><div class="slot slot-2"></div>
            <div class="slot slot-3"></div><div class="slot slot-4"></div>
            <div class="slot slot-5"></div><div class="slot slot-6"></div>
            <div class="slot slot-7"></div><div class="slot slot-8"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="location.reload()">Reset / Shuffle</button>
    </div>

    <script>
        const deckContainer = document.getElementById('deck-container');
        const gridContainer = document.getElementById('layout-grid');
        const statusText = document.getElementById('status');
        let selectedCount = 0;
        const totalToPick = 8;

        // Sumber Gambar: Menggunakan CDN jsDelivr untuk stabilitas tinggi
        const IMG_URL = "https://cdn.jsdelivr.net/gh/ekelen/tarot-api@master/static/cards/";

        function getCardData() {
            const data = [];
            const majors = ["Fool","Magician","Priestess","Empress","Emperor","Hierophant","Lovers","Chariot","Strength","Hermit","Wheel","Justice","HangedMan","Death","Temperance","Devil","Tower","Star","Moon","Sun","Judgement","World"];
            const suits = ["wa", "cu", "sw", "pe"];
            const suitNames = {wa:"Wands", cu:"Cups", sw:"Swords", pe:"Pentacles"};

            majors.forEach((name, i) => {
                data.push({ name: name, file: `m${i.toString().padStart(2,'0')}.jpg` });
            });

            suits.forEach(s => {
                for(let v=1; v<=14; v++) {
                    data.push({ name: `${suitNames[s]} ${v}`, file: `${s}${v.toString().padStart(2,'0')}.jpg` });
                }
            });
            return data.sort(() => Math.random() - 0.5);
        }

        function init() {
            const cards = getCardData();
            deckContainer.innerHTML = '';
            statusText.innerText = "Geser dan Pilih 8 Kartu";

            cards.forEach(cardData => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <div class="card-fallback">${cardData.name}</div>
                            <img src="${IMG_URL}${cardData.file}" loading="lazy" alt="${cardData.name}">
                            <div class="card-label">${cardData.name}</div>
                        </div>
                    </div>
                `;
                cardDiv.onclick = () => pickCard(cardDiv);
                deckContainer.appendChild(cardDiv);
            });
        }

        function pickCard(el) {
            if (selectedCount >= totalToPick || el.classList.contains('picked')) return;

            selectedCount++;
            el.classList.add('picked', 'flipped');
            
            // Random Reverse (180deg)
            const isRev = Math.random() > 0.5;
            if(isRev) {
                el.querySelector('.card-inner').style.transform = "rotateY(180deg) rotateZ(180deg)";
                el.querySelector('.card-label').innerText += " (Rev)";
            }

            // Animasi Perpindahan
            const slot = document.querySelector(`.slot-${selectedCount}`);
            const rectStart = el.getBoundingClientRect();
            const rectEnd = slot.getBoundingClientRect();

            el.classList.add('moving');
            el.style.left = rectStart.left + 'px';
            el.style.top = rectStart.top + 'px';

            // Trigger perpindahan posisi ke target slot
            setTimeout(() => {
                el.style.left = rectEnd.left + 'px';
                el.style.top = rectEnd.top + 'px';
            }, 10);

            // Masukkan secara permanen ke slot setelah animasi selesai
            setTimeout(() => {
                el.classList.remove('moving');
                el.style.position = 'absolute';
                el.style.left = '0';
                el.style.top = '0';
                
                if (selectedCount === 1) el.classList.add('final-1');
                if (selectedCount === 2) el.classList.add('final-2');

                slot.appendChild(el);
            }, 600);

            statusText.innerText = `Terpilih ${selectedCount} / ${totalToPick}`;

            if(selectedCount === totalToPick) {
                gridContainer.style.opacity = '1';
                statusText.innerText = "Pembacaan Selesai";
                document.querySelectorAll('.card:not(.picked)').forEach(c => c.style.opacity = '0');
            }
        }

        // Jalankan Inisialisasi
        window.onload = init;
    </script>
</body>
</html>
