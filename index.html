<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarot Oracle - Fixed</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --accent-color: #f1c40f;
            --card-width: 80px;
            --card-height: 140px;
            --transition-speed: 0.6s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #24243e 0%, #0f0c29 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { padding: 20px; text-align: center; z-index: 10; }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent-color); text-transform: uppercase; }
        #status-text { font-size: 0.9rem; margin-top: 5px; color: #aaa; }

        #deck-container {
            position: relative;
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), 
                        top 0.5s ease, left 0.5s ease, opacity 0.5s;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .card-back {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--accent-color);
        }

        .card-back::after {
            content: "★";
            font-size: 2rem;
            color: var(--accent-color);
        }

        .card-front {
            background: #2c3e50;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fallback text if image fails */
        .card-name-fallback {
            position: absolute;
            padding: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #f1c40f;
            z-index: -1;
        }

        .card-label {
            position: absolute;
            bottom: 0; width: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            font-size: 0.55rem;
            text-align: center;
            padding: 4px 2px;
            pointer-events: none;
        }

        #layout-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 150px);
            gap: 10px;
            width: 95%;
            max-width: 450px;
            margin: 10px auto;
            opacity: 0;
            transition: opacity 1s;
        }

        .slot {
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 8px;
            position: relative;
        }

        .slot-1 { grid-column: 2; grid-row: 2; }
        .slot-2 { grid-column: 2; grid-row: 2; z-index: 5; }
        .slot-3 { grid-column: 2; grid-row: 1; }
        .slot-4 { grid-column: 2; grid-row: 3; }
        .slot-5 { grid-column: 3; grid-row: 2; }
        .slot-7 { grid-column: 4; grid-row: 2; }
        .slot-8 { grid-column: 4; grid-row: 1; }
        .slot-6 { grid-column: 4; grid-row: 3; }

        .controls { margin: 20px; z-index: 10; }
        button {
            background: rgba(241, 196, 15, 0.1);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 30px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @media (orientation: landscape) {
            :root { --card-width: 60px; --card-height: 100px; }
            #layout-container { grid-template-rows: repeat(3, 110px); }
            #deck-container { height: 150px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tarot Oracle</h1>
        <div id="status-text">Memuat deck...</div>
    </header>

    <div id="deck-container"></div>

    <div id="layout-container">
        <div class="slot slot-1"></div><div class="slot slot-2"></div>
        <div class="slot slot-3"></div><div class="slot slot-4"></div>
        <div class="slot slot-5"></div><div class="slot slot-6"></div>
        <div class="slot slot-7"></div><div class="slot slot-8"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">RESET & SHUFFLE</button>
    </div>

    <script>
        const deckContainer = document.getElementById('deck-container');
        const layoutContainer = document.getElementById('layout-container');
        const statusText = document.getElementById('status-text');

        let selectedCount = 0;
        const totalToSelect = 8;
        let cardsData = [];

        // Generate Data dengan URL Alternatif (Sacred-Texts)
        function initData() {
            cardsData = [];
            // Major Arcana (ar00.jpg - ar21.jpg)
            for (let i = 0; i <= 21; i++) {
                let id = i.toString().padStart(2, '0');
                cardsData.push({
                    name: getMajorName(i),
                    img: `https://www.sacred-texts.com/tarot/pkt/img/ar${id}.jpg`
                });
            }
            // Minor Arcana
            const suits = [{s:'wa', n:'Wands'}, {s:'cu', n:'Cups'}, {s:'sw', n:'Swords'}, {s:'pe', n:'Pentacles'}];
            suits.forEach(suit => {
                for (let v = 1; v <= 14; v++) {
                    let id = v.toString().padStart(2, '0');
                    cardsData.push({
                        name: `${suit.n} ${v}`,
                        img: `https://www.sacred-texts.com/tarot/pkt/img/${suit.s}${id}.jpg`
                    });
                }
            });
        }

        function getMajorName(i) {
            const names = ["The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"];
            return names[i];
        }

        function createDeck() {
            initData();
            deckContainer.innerHTML = '';
            layoutContainer.style.opacity = '0';
            selectedCount = 0;
            statusText.innerText = "Ketuk 8 kartu dari tumpukan";

            const shuffled = cardsData.sort(() => Math.random() - 0.5);

            shuffled.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.zIndex = 80 - index;
                
                // Spread deck slightly
                const spreadX = (Math.random() - 0.5) * 60;
                const spreadY = (Math.random() - 0.5) * 20;
                card.style.left = `calc(50% - var(--card-width)/2 + ${spreadX}px)`;
                card.style.top = `${20 + spreadY}px`;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <span class="card-name-fallback">${data.name}</span>
                            <img src="${data.img}" alt="${data.name}" onerror="this.style.display='none'">
                            <div class="card-label">${data.name}</div>
                        </div>
                    </div>
                `;

                card.onclick = () => selectCard(card, data);
                deckContainer.appendChild(card);
            });
        }

        function selectCard(cardElem, data) {
            if (selectedCount >= totalToSelect || cardElem.classList.contains('selected')) return;

            selectedCount++;
            cardElem.classList.add('selected');
            cardElem.classList.add('flipped');

            const isReversed = Math.random() > 0.5;
            if (isReversed) {
                cardElem.querySelector('.card-inner').style.transform = "rotateY(180deg) rotateZ(180deg)";
                cardElem.querySelector('.card-label').innerText += " (Rev)";
            }

            const slot = document.querySelector(`.slot-${selectedCount}`);
            const slotRect = slot.getBoundingClientRect();
            const deckRect = deckContainer.getBoundingClientRect();

            const targetX = slotRect.left - deckRect.left + (slotRect.width/2 - 40);
            const targetY = slotRect.top - deckRect.top + (slotRect.height/2 - 70);

            cardElem.style.left = `${targetX}px`;
            cardElem.style.top = `${targetY}px`;
            cardElem.style.zIndex = 100 + selectedCount;

            // Layout rotations
            if (selectedCount === 1) cardElem.style.transform = `rotate(90deg)`;
            if (selectedCount === 2) cardElem.style.transform = `rotate(0deg)`;

            statusText.innerText = `Kartu ${selectedCount} dari ${totalToSelect}`;

            if (selectedCount === totalToSelect) {
                setTimeout(() => {
                    layoutContainer.style.opacity = '1';
                    statusText.innerText = "Pembacaan Selesai";
                    document.querySelectorAll('.card:not(.selected)').forEach(c => c.style.opacity = '0');
                }, 600);
            }
        }

        function resetGame() {
            createDeck();
        }

        window.onload = createDeck;
    </script>
</body>
</html>
