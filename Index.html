<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Tarot Reading</title>
    <style>
        :root {
            --bg-color: #0f0c29;
            --accent-color: #f1c40f;
            --card-width: 80px;
            --card-height: 140px;
            --transition-speed: 0.6s;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        #status-text {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Deck Area */
        #deck-container {
            position: relative;
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .card {
            position: absolute;
            width: var(--card-width);
            height: var(--card-height);
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), 
                        top 0.5s ease, left 0.5s ease;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .card-back {
            background: #2c3e50 url('https://www.transparenttextures.com/patterns/dark-matter.png');
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #1a252f;
        }

        .card-back::after {
            content: "✧";
            font-size: 2rem;
            color: var(--accent-color);
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 0.6rem;
            text-align: center;
            padding: 2px 0;
            pointer-events: none;
        }

        /* Final Layout Grid */
        #layout-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 160px);
            gap: 10px;
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
            position: relative;
            opacity: 0;
            transition: opacity 1s;
        }

        .slot {
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Mapping Posisi Sesuai Instruksi */
        /* Col 1 & 2 (Center) */
        .slot-1 { grid-column: 2; grid-row: 2; }
        .slot-2 { grid-column: 2; grid-row: 2; z-index: 5; } /* Tumpuk di tengah */
        .slot-3 { grid-column: 2; grid-row: 1; }
        .slot-4 { grid-column: 2; grid-row: 3; }
        .slot-5 { grid-column: 3; grid-row: 2; }
        .slot-7 { grid-column: 4; grid-row: 2; }
        .slot-8 { grid-column: 4; grid-row: 1; }
        .slot-6 { grid-column: 4; grid-row: 3; }

        /* Rotasi Khusus Layout */
        .card.in-layout-1 { transform: rotate(90deg) rotateY(180deg) !important; }
        .card.in-layout-2 { transform: rotate(0deg) rotateY(180deg) !important; }
        .card.reversed { filter: hue-rotate(10deg); } /* Marker visual tambahan */

        /* Controls */
        .controls {
            margin: 20px;
            z-index: 10;
        }

        button {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        @media (orientation: landscape) {
            body { padding-top: 10px; }
            #deck-container { height: 180px; }
            :root { --card-width: 60px; --card-height: 100px; }
            #layout-container { grid-template-rows: repeat(3, 110px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tarot Oracle</h1>
        <div id="status-text">Pilih 8 kartu untuk memulai</div>
    </header>

    <div id="deck-container">
        </div>

    <div id="layout-container">
        <div class="slot slot-1"></div>
        <div class="slot slot-2"></div>
        <div class="slot slot-3"></div>
        <div class="slot slot-4"></div>
        <div class="slot slot-5"></div>
        <div class="slot slot-6"></div>
        <div class="slot slot-7"></div>
        <div class="slot slot-8"></div>
    </div>

    <div class="controls">
        <button onclick="resetGame()">Shuffle Ulang</button>
    </div>

    <audio id="audio-flip" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="audio-shuffle" src="https://assets.mixkit.co/active_storage/sfx/1120/1120-preview.mp3"></audio>

    <script>
        const deckContainer = document.getElementById('deck-container');
        const layoutContainer = document.getElementById('layout-container');
        const statusText = document.getElementById('status-text');
        const audioFlip = document.getElementById('audio-flip');
        const audioShuffle = document.getElementById('audio-shuffle');

        let selectedCount = 0;
        const totalToSelect = 8;
        const cardsData = [];

        // Inisialisasi Data Kartu (78 Kartu)
        const suits = ['Wands', 'Cups', 'Swords', 'Pentacles'];
        const values = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12', '13', '14'];
        
        // Major Arcana (0-21)
        for (let i = 0; i <= 21; i++) {
            cardsData.push({
                name: `Major Arcana ${i}`,
                img: `https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/m${i.toString().padStart(2, '0')}.jpg`
            });
        }
        // Minor Arcana
        suits.forEach((suit, sIdx) => {
            const sChar = suit[0].toLowerCase();
            for (let v = 1; v <= 14; v++) {
                cardsData.push({
                    name: `${suit} ${v}`,
                    img: `https://raw.githubusercontent.com/ekelen/tarot-api/master/static/cards/${sChar}${v.toString().padStart(2, '0')}.jpg`
                });
            }
        });

        function createDeck() {
            deckContainer.innerHTML = '';
            layoutContainer.style.opacity = '0';
            selectedCount = 0;
            statusText.innerText = "Pilih 8 kartu untuk memulai";

            // Acak urutan data
            const shuffledData = [...cardsData].sort(() => Math.random() - 0.5);

            shuffledData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.zIndex = 78 - index;
                
                // Animasi tumpukan awal (shuffle effect)
                const randomOffset = (Math.random() - 0.5) * 40;
                card.style.left = `calc(50% - var(--card-width)/2 + ${randomOffset}px)`;
                card.style.top = `${20 + (Math.random() * 10)}px`;

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back"></div>
                        <div class="card-front">
                            <img src="${data.img}" alt="${data.name}">
                            <div class="card-label">${data.name}</div>
                        </div>
                    </div>
                `;

                card.onclick = () => selectCard(card, data);
                deckContainer.appendChild(card);
            });

            audioShuffle.play().catch(() => {});
        }

        function selectCard(cardElem, data) {
            if (selectedCount >= totalToSelect || cardElem.classList.contains('selected')) return;

            selectedCount++;
            cardElem.classList.add('selected');
            cardElem.classList.add('flipped');
            audioFlip.play().catch(() => {});

            // Tentukan Upright atau Reversed (50/50)
            const isReversed = Math.random() > 0.5;
            const cardInner = cardElem.querySelector('.card-inner');
            
            if (isReversed) {
                cardInner.style.transform = "rotateY(180deg) rotateZ(180deg)";
                cardElem.querySelector('.card-label').innerText += " (Reversed)";
            }

            // Pindahkan ke slot layout
            const slot = document.querySelector(`.slot-${selectedCount}`);
            const slotRect = slot.getBoundingClientRect();
            const deckRect = deckContainer.getBoundingClientRect();

            // Hitung posisi relatif untuk transisi
            const targetX = slotRect.left - deckRect.left + (slotRect.width/2 - 40);
            const targetY = slotRect.top - deckRect.top + (slotRect.height/2 - 70);

            // Terapkan posisi baru
            cardElem.style.left = `${targetX}px`;
            cardElem.style.top = `${targetY}px`;
            cardElem.style.zIndex = 100 + selectedCount;

            // Aturan rotasi layout khusus instruksi
            if (selectedCount === 1) {
                cardElem.style.transform = `rotate(90deg)`;
            } else if (selectedCount === 2) {
                cardElem.style.transform = `rotate(0deg)`;
            }

            statusText.innerText = `Terpilih: ${selectedCount} / ${totalToSelect}`;

            if (selectedCount === totalToSelect) {
                finishReading();
            }
        }

        function finishReading() {
            statusText.innerText = "Pembacaan Selesai";
            layoutContainer.style.opacity = '1';
            
            // Sembunyikan sisa kartu di deck
            const allCards = document.querySelectorAll('.card:not(.selected)');
            allCards.forEach(c => c.style.opacity = '0');
        }

        function resetGame() {
            createDeck();
        }

        // Jalankan saat pertama kali buka
        window.onload = createDeck;

    </script>
</body>
</html>
