<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot Reading</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0d0d12 70%);
  color:white;
  overflow-x:hidden;
}

/* GLOW BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(120,0,255,0.15), transparent 60%);
  animation: pulse 6s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

h1{
  text-align:center;
  font-size:14px;
  opacity:.6;
  margin:8px 0;
}

/* ===== DECK ===== */
.deck{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:6px;
  padding:10px;
}

.card{
  width:42px;
  height:65px;
  perspective:800px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:.6s;
}

.card.flipped .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:8px;
  backface-visibility:hidden;
}

/* BACK DESIGN */
.back{
  background: linear-gradient(145deg,#1f1f2e,#111);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:#aaa;
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* FRONT */
.front{
  transform:rotateY(180deg);
  background-size:cover;
  background-position:center;
  box-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* ===== READING AREA ===== */
.reading{
  position:relative;
  height:450px;
}

/* CARD FINAL */
.card-large{
  position:absolute;
  width:90px;
  text-align:center;
  font-size:10px;
  opacity:0;
  transform:scale(.7);
  animation: fadeIn .6s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:scale(1);
  }
}

.card-large img{
  width:100%;
  border-radius:12px;
  box-shadow:0 0 20px rgba(255,255,255,0.15);
}

.card-large div{
  margin-top:4px;
  opacity:.7;
}

/* ROTATION */
.reversed img{ transform:rotate(180deg); }
.rotate90 img{ transform:rotate(90deg); }

/* POSISI */
.pos1 { left:28%; top:45%; }
.pos2 { left:45%; top:45%; }
.pos3 { left:36%; top:10%; }
.pos4 { left:36%; top:78%; }
.pos5 { left:63%; top:45%; }
.pos7 { left:80%; top:45%; }
.pos6 { left:80%; top:78%; }
.pos8 { left:80%; top:10%; }

/* BUTTON */
button{
  display:block;
  margin:10px auto;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(145deg,#6a00ff,#3a00aa);
  color:white;
  font-size:12px;
}

/* SHUFFLE ANIMATION */
@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
  100%{transform:translateY(0);}
}

.deck.shuffle .card{
  animation:float .6s infinite;
}
</style>
</head>

<body>

<h1>Choose Your 8 Cards</h1>

<div id="deck" class="deck shuffle"></div>
<div id="reading" class="reading"></div>

<button onclick="resetReading()">Shuffle Again</button>

<audio id="flipSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce63.mp3"></audio>

<script>

// CDN
const BASE="https://cdn.jsdelivr.net/npm/tarot-card-img/";

// DATA
const major=[
"the-fool","the-magician","the-high-priestess","the-empress","the-emperor",
"the-hierophant","the-lovers","the-chariot","strength","the-hermit",
"wheel-of-fortune","justice","the-hanged-man","death","temperance",
"the-devil","the-tower","the-star","the-moon","the-sun","judgement","the-world"
];

const suits=["wands","cups","swords","pentacles"];
const ranks=["ace","2","3","4","5","6","7","8","9","10","page","knight","queen","king"];

let tarot=[];

major.forEach(c=>{
  tarot.push({name:c.replace(/-/g," "),img:BASE+"major/"+c+".jpg"});
});

suits.forEach(s=>{
  ranks.forEach(r=>{
    tarot.push({name:r+" of "+s,img:BASE+s+"/"+r+"_of_"+s+".jpg"});
  });
});

let selected=[];

const deckEl=document.getElementById("deck");
const readingEl=document.getElementById("reading");

// LOAD
function loadDeck(){
  deckEl.innerHTML="";
  deckEl.classList.add("shuffle");

  tarot.forEach((card,i)=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <div class="inner">
        <div class="back">✦</div>
        <div class="front" id="f${i}"></div>
      </div>
    `;

    el.onclick=()=>pickCard(i,el);
    deckEl.appendChild(el);
  });

  setTimeout(()=>deckEl.classList.remove("shuffle"),1500);
}

// PICK
function pickCard(i,el){
  if(selected.length>=8) return;
  if(selected.find(c=>c.i===i)) return;

  document.getElementById("flipSound").play();

  el.classList.add("flipped");
  document.getElementById("f"+i).style.backgroundImage=`url(${tarot[i].img})`;

  const reversed=Math.random()>0.5;

  selected.push({i,reversed});

  setTimeout(()=>placeCard(selected.length-1),500);
}

// PLACE
function placeCard(pos){
  const data=selected[pos];
  const c=tarot[data.i];

  const div=document.createElement("div");
  div.className="card-large pos"+(pos+1);

  if(data.reversed) div.classList.add("reversed");
  if(pos===1) div.classList.add("rotate90");

  div.innerHTML=`
    <img src="${c.img}" onerror="this.src='https://via.placeholder.com/200x300?text=Card'">
    <div>${c.name}</div>
  `;

  readingEl.appendChild(div);
}

// RESET
function resetReading(){
  selected=[];
  readingEl.innerHTML="";
  loadDeck();
}

loadDeck();

</script>

</body>
</html>
